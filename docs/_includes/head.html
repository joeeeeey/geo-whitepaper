<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#07090e" />
{%- assign t = page.title | default: site.title -%}
<title>{% if page.title and page.url != "/" %}{{ t }} · GEO 白皮书{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.description }}" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap"
  rel="stylesheet"
/>
{%- assign asset_v = site.time | date: '%s' -%}
<link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}?v={{ asset_v }}" />
<link rel="canonical" href="{{ page.url | absolute_url }}" />
<script>
  // Apply theme before paint to avoid FOUC. Default: light. Saved choice wins.
  (function () {
    try {
      var saved = localStorage.getItem("geo-theme");
      var theme = saved === "dark" || saved === "light" ? saved : "light";
      document.documentElement.setAttribute("data-theme", theme);
    } catch (e) {
      document.documentElement.setAttribute("data-theme", "light");
    }
  })();
</script>
